services:
  webhook-catcher:
    image: node:24-alpine
    container_name: vintrack_webhook_catcher
    command:
      - node
      - -e
      - |
        const http = require('http');
        http.createServer((req, res) => {
          let body = '';
          req.on('data', (chunk) => body += chunk);
          req.on('end', () => {
            console.log('[webhook-catcher] ' + req.method + ' ' + req.url);
            if (body) console.log(body);
            res.writeHead(204);
            res.end();
          });
        }).listen(8080, '0.0.0.0', () => console.log('[webhook-catcher] listening on :8080'));
    ports:
      - "127.0.0.1:8088:8080"

  worker:
    environment:
      - VINTED_FETCH_MODE=mock
      - VINTED_MOCK_SCENARIO=${VINTED_MOCK_SCENARIO:-new-items}
      - VINTED_MOCK_DROP_INTERVAL_MS=${VINTED_MOCK_DROP_INTERVAL_MS:-3000}
      - ENRICH_SELLER_INFO=false
      - VINTED_MOCK_DISCORD_WEBHOOK_URL=${VINTED_MOCK_DISCORD_WEBHOOK_URL:-http://webhook-catcher:8080/api/webhooks/mock/token}
    depends_on:
      webhook-catcher:
        condition: service_started
