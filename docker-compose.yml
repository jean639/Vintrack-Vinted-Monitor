services:
  caddy:
    image: caddy:2-alpine
    container_name: vintrack_caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - control-center
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: vintrack_db
    environment:
      POSTGRES_USER: vinuser
      POSTGRES_PASSWORD: vinpassword
      POSTGRES_DB: vintrack
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinuser -d vintrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vintrack_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --stop-writes-on-bgsave-error no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  control-center:
    build:
      context: ./apps/control-center
      dockerfile: Dockerfile
    image: ghcr.io/jakobaiodev/vintrack-vinted-monitor/control-center:latest
    container_name: vintrack_control_center
    environment:
      - DATABASE_URL=postgresql://vinuser:vinpassword@postgres:5432/vintrack
      - REDIS_URL=redis://redis:6379
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_DISCORD_ID=${AUTH_DISCORD_ID}
      - AUTH_DISCORD_SECRET=${AUTH_DISCORD_SECRET}
      - AUTH_TRUST_HOST=true
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - DASHBOARD_URL=${DASHBOARD_URL:-http://localhost:3000}
      - VINTED_SERVICE_URL=http://vinted-service:4000
      - BROWSER_EXTENSION_LATEST_VERSION=${BROWSER_EXTENSION_LATEST_VERSION:-0.1.3}
      - BROWSER_EXTENSION_MIN_VERSION=${BROWSER_EXTENSION_MIN_VERSION:-0.1.3}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      - AUTH_OIDC_ISSUER=${AUTH_OIDC_ISSUER:-}
      - AUTH_OIDC_CLIENT_ID=${AUTH_OIDC_CLIENT_ID:-}
      - AUTH_OIDC_CLIENT_SECRET=${AUTH_OIDC_CLIENT_SECRET:-}
      - AUTH_OIDC_NAME=${AUTH_OIDC_NAME:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      control-center-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  control-center-migrate:
    build:
      context: ./apps/control-center
      dockerfile: Dockerfile
    image: ghcr.io/jakobaiodev/vintrack-vinted-monitor/control-center:latest
    container_name: vintrack_migrate
    command: ["sh", "-c", "npx prisma migrate deploy"]
    environment:
      - DATABASE_URL=postgresql://vinuser:vinpassword@postgres:5432/vintrack
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  vinted-service:
    build:
      context: ./apps/vinted-service
      dockerfile: Dockerfile
    image: ghcr.io/jakobaiodev/vintrack-vinted-monitor/vinted-service:latest
    container_name: vintrack_vinted
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - DATABASE_URL=postgres://vinuser:vinpassword@postgres:5432/vintrack?sslmode=disable
      - VINTED_SESSION_ENCRYPTION_KEY=${VINTED_SESSION_ENCRYPTION_KEY}
      - LISTEN_ADDR=:4000
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      control-center-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    image: ghcr.io/jakobaiodev/vintrack-vinted-monitor/worker:latest
    container_name: vintrack_worker
    environment:
      - WORKER_ROLE=monitor
      - DATABASE_URL=postgres://vinuser:vinpassword@postgres:5432/vintrack?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - PROXY_FILE=/app/proxies.txt
      - VINTED_FETCH_MODE=${VINTED_FETCH_MODE:-live}
      - VINTED_MOCK_SCENARIO=${VINTED_MOCK_SCENARIO:-new-items}
      - VINTED_MOCK_DROP_INTERVAL_MS=${VINTED_MOCK_DROP_INTERVAL_MS:-3000}
      - ENRICH_SELLER_INFO=${ENRICH_SELLER_INFO:-true}
      - CLIENT_POOL_SIZE=${CLIENT_POOL_SIZE:-5}
      - TLS_PROFILE=${TLS_PROFILE:-chrome_144}
      - CATALOG_TIMEOUT_MS=${CATALOG_TIMEOUT_MS:-2000}
      - CATALOG_HEDGE_DELAY_MS=${CATALOG_HEDGE_DELAY_MS:-250}
      - DISCOVERY_MODE=${DISCOVERY_MODE:-off}
      - DISCOVERY_ALLOW_FREE_ACTIVE=${DISCOVERY_ALLOW_FREE_ACTIVE:-false}
      - DISCOVERY_INTERVAL_MS=${DISCOVERY_INTERVAL_MS:-500}
      - DISCOVERY_FREE_INTERVAL_MS=${DISCOVERY_FREE_INTERVAL_MS:-500}
      - DISCOVERY_PER_PAGE=${DISCOVERY_PER_PAGE:-96}
      - DISCOVERY_FREE_PER_PAGE=${DISCOVERY_FREE_PER_PAGE:-64}
      - DISCOVERY_MAX_BACKFILL_PAGES=${DISCOVERY_MAX_BACKFILL_PAGES:-3}
      - DISCOVERY_FREE_CLIENT_POOL_SIZE=${DISCOVERY_FREE_CLIENT_POOL_SIZE:-8}
      - DISCOVERY_FREE_TIMEOUT_MS=${DISCOVERY_FREE_TIMEOUT_MS:-3000}
      - DISCOVERY_FREE_HEDGE_DELAY_MS=${DISCOVERY_FREE_HEDGE_DELAY_MS:-150}
      - ALERT_WORKERS=${ALERT_WORKERS:-8}
      - DISCORD_ALERT_WORKERS=${DISCORD_ALERT_WORKERS:-8}
      - TELEGRAM_ALERT_WORKERS=${TELEGRAM_ALERT_WORKERS:-16}
      - ENRICHMENT_WORKERS=${ENRICHMENT_WORKERS:-8}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DASHBOARD_URL=${DASHBOARD_URL:-http://localhost:3000}
    volumes:
      - ./apps/worker/proxies.txt:/app/proxies.txt
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      control-center-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  id-scanner:
    profiles: ["preindex"]
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    image: ghcr.io/jakobaiodev/vintrack-vinted-monitor/worker:latest
    container_name: vintrack_id_scanner
    environment:
      - WORKER_ROLE=id-scanner
      - DATABASE_URL=postgres://vinuser:vinpassword@postgres:5432/vintrack?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - PROXY_FILE=/app/proxies.txt
      - ID_SCANNER_ENABLED=${ID_SCANNER_ENABLED:-false}
      - ID_SCANNER_REGION=${ID_SCANNER_REGION:-de}
      - ID_SCANNER_STRIDE=${ID_SCANNER_STRIDE:-100}
      - ID_SCANNER_INTERVAL_MS=${ID_SCANNER_INTERVAL_MS:-500}
      - ID_SCANNER_JITTER_MS=${ID_SCANNER_JITTER_MS:-200}
      - ID_SCANNER_TIMEOUT_MS=${ID_SCANNER_TIMEOUT_MS:-2000}
      - ID_SCANNER_POOL_SIZE=${ID_SCANNER_POOL_SIZE:-16}
      - ID_SCANNER_PROXY_OFFSET=${ID_SCANNER_PROXY_OFFSET:-32}
      - ID_SCANNER_STUCK_SKIP_AFTER=${ID_SCANNER_STUCK_SKIP_AFTER:-10}
      - ID_SCANNER_MAX_AHEAD=${ID_SCANNER_MAX_AHEAD:-10000}
      - TLS_PROFILE=${TLS_PROFILE:-chrome_144}
    volumes:
      - ./apps/worker/proxies.txt:/app/proxies.txt
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      control-center-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  proxy-maintainer:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    image: ghcr.io/jakobaiodev/vintrack-vinted-monitor/worker:latest
    container_name: vintrack_proxy_maintainer
    environment:
      - WORKER_ROLE=proxy-maintainer
      - DATABASE_URL=postgres://vinuser:vinpassword@postgres:5432/vintrack?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - PROXY_FILE=/app/proxies.txt
      - DETECTION_RETENTION_DAYS=${DETECTION_RETENTION_DAYS:-14}
      - PREINDEX_PROBE_RETENTION_HOURS=${PREINDEX_PROBE_RETENTION_HOURS:-48}
      - PREINDEX_SAMPLE_RETENTION_DAYS=${PREINDEX_SAMPLE_RETENTION_DAYS:-14}
      - TLS_PROFILE=${TLS_PROFILE:-chrome_144}
    volumes:
      - ./apps/worker/proxies.txt:/app/proxies.txt
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      control-center-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
