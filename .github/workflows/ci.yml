name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  control-center:
    name: Control Center
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/control-center

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vintrack?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/control-center/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run lint
        run: npm run lint

      - name: Build dashboard
        run: npm run build

  go-tests:
    name: Go Tests (${{ matrix.app }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - apps/worker
          - apps/vinted-service

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.app }}/go.mod
          cache: true
          cache-dependency-path: ${{ matrix.app }}/go.sum

      - name: Run tests
        run: go test ./...
