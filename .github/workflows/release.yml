name: Release and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  version:
    name: Read release version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      major_minor: ${{ steps.version.outputs.major_minor }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read package version
        id: version
        working-directory: apps/control-center
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          MAJOR_MINOR="$(node -p "const v=require('./package.json').version.split('.'); v.slice(0, 2).join('.')")"
          TAG="v$VERSION"

          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and push ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.tag_exists == 'false'
    strategy:
      fail-fast: false
      matrix:
        app:
          - control-center
          - vinted-service
          - worker

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=${{ needs.version.outputs.major_minor }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - version
      - build-and-push
    if: needs.version.outputs.tag_exists == 'false'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          BROWSER_EXTENSION_LATEST_VERSION: ${{ vars.BROWSER_EXTENSION_LATEST_VERSION || '0.1.3' }}
          BROWSER_EXTENSION_MIN_VERSION: ${{ vars.BROWSER_EXTENSION_MIN_VERSION || '0.1.3' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          envs: BROWSER_EXTENSION_LATEST_VERSION,BROWSER_EXTENSION_MIN_VERSION
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH || '/Vintrack' }}"

            git pull --ff-only

            touch .env
            sed -i '/^BROWSER_EXTENSION_LATEST_VERSION=/d' .env
            sed -i '/^BROWSER_EXTENSION_MIN_VERSION=/d' .env
            printf '%s\n' \
              "BROWSER_EXTENSION_LATEST_VERSION=$BROWSER_EXTENSION_LATEST_VERSION" \
              "BROWSER_EXTENSION_MIN_VERSION=$BROWSER_EXTENSION_MIN_VERSION" \
              >> .env

            docker compose config --quiet
            docker compose pull control-center control-center-migrate vinted-service worker
            docker compose up -d --remove-orphans

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - version
      - deploy
    if: needs.version.outputs.tag_exists == 'false'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build browser extension packages
        run: apps/vintrack-browser-sync-extension/scripts/build-packages.sh

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.version.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ needs.version.outputs.tag }}" \
            --generate-notes \
            apps/vintrack-browser-sync-extension/dist/vintrack-browser-sync-extension.zip \
            apps/vintrack-browser-sync-extension/dist/vintrack-browser-sync-extension-firefox.xpi
