name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to prepare
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release PR
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/control-center

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/control-center/package-lock.json

      - name: Bump version
        id: version
        run: |
          npm version "${{ inputs.bump }}" --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Release v${{ steps.version.outputs.version }}
          branch: release/v${{ steps.version.outputs.version }}
          delete-branch: true
          title: Release v${{ steps.version.outputs.version }}
          body: |
            Prepares release `v${{ steps.version.outputs.version }}`.

            Merging this PR to `main` will build Docker images, create the GitHub release, and deploy to production.
          labels: release
